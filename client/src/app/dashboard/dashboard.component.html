<div class="card" *ngIf="dashboard">
  <div class="card-header">Dashboard</div>
  <div class="card-body">
    <div class="row text-center">
      <div class="col-md-3"><div class="alert alert-primary">Customers<br>{{dashboard.totalCustomers}}</div></div>
      <div class="col-md-3"><div class="alert alert-success">Contracts<br>{{dashboard.totalContracts}}</div></div>
      <div class="col-md-3"><div class="alert alert-warning">Payments<br>{{dashboard.totalPayments}}</div></div>
      <div class="col-md-3"><div class="alert alert-info">Amount<br>{{dashboard.totalPaymentAmount | number:'1.2-2'}}</div></div>
    </div>
    <h5>Recent Contracts</h5>
    <table class="table table-sm">
      <tr><th>Id</th><th>Type</th><th>Status</th><th>Customer</th></tr>
      <tr *ngFor="let c of dashboard.recentContracts">
        <td>{{c.id}}</td><td>{{c.type}}</td><td>{{c.status}}</td><td>{{c.customerDTO?.name}}</td>
      </tr>
    </table>
  </div>
</div>
