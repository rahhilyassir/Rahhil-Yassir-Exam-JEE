<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span>Contrats</span>
    <a class="btn btn-sm btn-primary" routerLink="/new-contract">Nouveau contrat</a>
  </div>
  <div class="card-body">
    <div class="table-wrap">
      <table class="table table-hover">
        <thead>
          <tr><th>Id</th><th>Type</th><th>Statut</th><th>Montant</th><th>Client</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of contracts">
            <td>{{c.id}}</td>
            <td>{{c.type}}</td>
            <td><span class="status-badge {{c.status}}">{{c.status}}</span></td>
            <td>{{c.contributionAmount | number:'1.2-2'}}</td>
            <td>{{c.customerDTO?.name}}</td>
            <td>
              <button class="btn btn-sm btn-outline-primary me-1" (click)="details(c)">Détails</button>
              <button class="btn btn-sm btn-outline-success me-1" (click)="validate(c)">Valider</button>
              <button class="btn btn-sm btn-outline-warning me-1" (click)="cancel(c)">Résilier</button>
              <button class="btn btn-sm btn-outline-danger" (click)="delete(c)">Supprimer</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
