<div class="card" *ngIf="customer">
  <div class="card-header">Détails du client</div>
  <div class="card-body">
    <div class="detail-list">
      <div class="detail-item">
        <div class="detail-label">ID</div>
        <div class="detail-value">{{customer.id}}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Nom</div>
        <div class="detail-value">{{customer.name}}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Email</div>
        <div class="detail-value">{{customer.email}}</div>
      </div>
    </div>

    <h5 class="mb-3">Contrats</h5>
    <div class="table-wrap">
      <table class="table table-hover">
        <thead>
          <tr><th>Id</th><th>Type</th><th>Statut</th><th>Montant</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of contracts">
            <td>{{c.id}}</td>
            <td>{{c.type}}</td>
            <td><span class="status-badge {{c.status}}">{{c.status}}</span></td>
            <td>{{c.contributionAmount | number:'1.2-2'}}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
