<div class="card">
  <div class="card-header">New Customer</div>
  <div class="card-body" *ngIf="mode=='new'">
    <div class="mb-3"><label>Name</label><input class="form-control" [(ngModel)]="customer.name"></div>
    <div class="mb-3"><label>Email</label><input class="form-control" [(ngModel)]="customer.email"></div>
    <button class="btn btn-primary" (click)="saveCustomer()">Save</button>
  </div>
  <div class="card-body" *ngIf="mode=='confirm'">
    <div class="alert alert-success">Customer saved with id {{customer.id}}</div>
    <button class="btn btn-primary" (click)="newCustomer()">New</button>
  </div>
</div>
