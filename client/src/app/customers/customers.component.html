<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span>Clients</span>
    <a class="btn btn-sm btn-primary" routerLink="/new-customer">Nouveau client</a>
  </div>
  <div class="card-body">
    <div class="input-group mb-3">
      <input class="form-control" placeholder="Rechercher par nom" [(ngModel)]="keyword">
      <button class="btn btn-primary" (click)="search()">Rechercher</button>
    </div>
    <div class="table-wrap">
      <table class="table table-hover">
        <thead>
          <tr><th>ID</th><th>Nom</th><th>Email</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of customers">
            <td>{{c.id}}</td>
            <td class="fw-semibold">{{c.name}}</td>
            <td>{{c.email}}</td>
            <td>
              <button class="btn btn-sm btn-outline-primary me-1" (click)="details(c)">Détails</button>
              <button class="btn btn-sm btn-outline-danger" (click)="delete(c)">Supprimer</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
